<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam UDP Control</title>
    <style>
        body { font-family: sans-serif; text-align: center; }
        #preview { width: 640px; border: 2px solid #333; margin-top: 10px; }
    </style>
</head>
<body>
    <h2>Webcam Control Panel</h2>
    <label>Select Camera:</label>
    <select id="cameraSelect">
        <option value="0">Camera 0 (Default)</option>
        <option value="1">Camera 1</option>
    </select>
    <br>
    <img id="preview" src="" alt="Waiting for frame...">
    <div id="stats">FPS: -- | Status: Ready</div>

    <script src="app.js"></script>
</body>
</html>
